<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Aligning Strategy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=12">
  <style>
    body {
      background: var(--purple-dark);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: var(--gutter);
    }
    .notfound-card {
      max-width: 600px;
    }
    .notfound-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      margin-bottom: 1rem;
      color: var(--gold);
    }
    .notfound-card h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: var(--white);
    }
    .notfound-card p {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      opacity: 0.85;
    }
  </style>
  <script>(function(){try{var t=localStorage.getItem("as.theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
</head>
<body>
  <div class="notfound-card">
    <span class="eyebrow" style="color:var(--gold); margin-bottom: 1rem;">Error 404</span>
    <h1>Not found</h1>
    <h2>This page doesn't exist</h2>
    <p>The page you were looking for can't be found. Let's get you back on track.</p>
    <a href="index.html" class="btn-primary">Back to home</a>
  </div>
</body>
</html>
