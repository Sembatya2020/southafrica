backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: de

# Nothing here is mandatory: every field can be left empty, and every list
# can be emptied, reordered or extended. Removing a list item removes it from
# the website. Each language is edited on its own; both are optional.

collections:
  - name: "content"
    label: "Website Inhalte"
    files:

      # ════════════════════════════════════════════════════════════════
      #  DEUTSCH
      # ════════════════════════════════════════════════════════════════
      - name: "deutsch"
        label: "🇩🇪 Deutsch – Texte bearbeiten"
        file: "content-de.json"
        fields:
          # ─── Startseite: Hero ───
          - { name: hero_eyebrow, label: "Start · Hero – Kleiner Text oben", widget: string, required: false }
          - { name: hero_h1,      label: "Start · Hero – Hauptüberschrift", widget: string, required: false, hint: "HTML erlaubt, z.B. <em>Text</em>" }
          - { name: hero_p,       label: "Start · Hero – Untertitel", widget: text, required: false }
          - { name: hero_btn1,    label: "Start · Hero – Button Termin", widget: string, required: false }
          - { name: hero_btn2,    label: "Start · Hero – Button Über mich", widget: string, required: false }

          # ─── Startseite: Willkommen ───
          - { name: welcome_eyebrow, label: "Start · Willkommen – Kleiner Text", widget: string, required: false }
          - { name: welcome_h2,      label: "Start · Willkommen – Überschrift", widget: string, required: false }
          - name: welcome_blocks
            label: "Start · Willkommen – Absätze"
            label_singular: "Absatz"
            widget: list
            required: false
            types: &blocktypes_de
              - { name: heading,    label: "Überschrift",     widget: object, fields: [ { name: text, label: "Text", widget: string, required: false } ] }
              - { name: subheading, label: "Zwischentitel",   widget: object, fields: [ { name: text, label: "Text", widget: string, required: false } ] }
              - { name: text,       label: "Absatz",          widget: object, fields: [ { name: text, label: "Text", widget: text,   required: false, hint: "Einfaches HTML erlaubt, z.B. <em> oder <strong>" } ] }
              - { name: quote,      label: "Zitat",           widget: object, fields: [ { name: text, label: "Text", widget: text,   required: false } ] }
              - { name: bullets,    label: "Aufzählung",      widget: object, fields: [ { name: items, label: "Punkte", widget: list, required: false } ] }
              - { name: button,     label: "Button",          widget: object, fields: [ { name: text, label: "Beschriftung", widget: string, required: false }, { name: link, label: "Link (z.B. kontakt.html)", widget: string, required: false } ] }
              - { name: image,      label: "Bild",            widget: object, fields: [ { name: image, label: "Bild", widget: image, required: false }, { name: alt, label: "Bildbeschreibung", widget: string, required: false } ] }
              - { name: spacer,     label: "Abstand (Leerraum)", widget: object, fields: [ { name: size, label: "Höhe (z.B. 2rem)", widget: string, required: false, default: "2rem" } ] }

          # ─── Startseite: Angebot (Karten) ───
          - { name: services_eyebrow, label: "Start · Angebot – Kleiner Text", widget: string, required: false }
          - { name: services_h2,      label: "Start · Angebot – Überschrift", widget: string, required: false }
          - { name: services_p,       label: "Start · Angebot – Einleitung", widget: text, required: false }
          - name: services_cards
            label: "Start · Angebot – Karten"
            label_singular: "Karte"
            widget: list
            required: false
            fields:
              - { name: title,     label: "Titel", widget: string, required: false }
              - { name: desc,      label: "Beschreibung", widget: text, required: false }
              - { name: link_text, label: "Link-Text (z.B. Mehr erfahren →)", widget: string, required: false }
              - { name: link,      label: "Link-Ziel (z.B. beratung.html)", widget: string, required: false }

          # ─── Startseite: Zitat ───
          - { name: phil_quote, label: "Start · Zitat", widget: text, required: false }
          - { name: phil_cite,  label: "Start · Zitat – Autorin", widget: string, required: false }

          # ─── Startseite: Über mich (Teaser) ───
          - { name: aboutT_eyebrow, label: "Start · Über mich – Kleiner Text", widget: string, required: false }
          - { name: aboutT_h2,      label: "Start · Über mich – Name", widget: string, required: false }
          - { name: aboutT_p1,      label: "Start · Über mich – Absatz 1", widget: text, required: false }
          - { name: aboutT_p2,      label: "Start · Über mich – Absatz 2", widget: text, required: false }
          - { name: aboutT_btn,     label: "Start · Über mich – Button", widget: string, required: false }

          # ─── Startseite: Galerie ───
          - name: gallery
            label: "Start · Galerie (Bilder)"
            label_singular: "Bild"
            widget: list
            required: false
            fields:
              - { name: image,   label: "Bild", widget: image, required: false }
              - { name: caption, label: "Bildunterschrift", widget: string, required: false }

          # ─── Startseite: Bewertungen ───
          - { name: testi_eb, label: "Start · Bewertungen – Kleiner Text", widget: string, required: false }
          - { name: testi_h2, label: "Start · Bewertungen – Überschrift", widget: string, required: false }
          - name: testimonials
            label: "Start · Bewertungen"
            label_singular: "Bewertung"
            widget: list
            required: false
            fields:
              - { name: quote, label: "Text", widget: text, required: false }
              - { name: cite,  label: "Name / Quelle", widget: string, required: false }

          # ─── Startseite: CTA & Footer ───
          - { name: cta_h2,   label: "Start · CTA – Überschrift", widget: string, required: false }
          - { name: cta_p,    label: "Start · CTA – Text", widget: text, required: false }
          - { name: cta_btn1, label: "Start · CTA – Button 1", widget: string, required: false }
          - { name: cta_btn2, label: "Start · CTA – Button 2", widget: string, required: false }
          - { name: footer_brand,     label: "Footer – Kurzbeschreibung", widget: text, required: false }
          - { name: footer_copyright, label: "Footer – Copyright", widget: string, required: false }
          - { name: footer_note,      label: "Footer – Hinweis", widget: string, required: false }

          # ─── Beratung ───
          - { name: beratung_page_title, label: "Beratung – Seitentitel", widget: string, required: false }
          - { name: beratung_h1,         label: "Beratung – Hauptüberschrift", widget: string, required: false }
          - { name: beratung_subtitle,   label: "Beratung – Untertitel", widget: string, required: false }
          - { name: beratung_blocks, label: "Beratung – Inhalt", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }

          # ─── Supervision ───
          - { name: supervision_page_title, label: "Supervision – Seitentitel", widget: string, required: false }
          - { name: supervision_h1,         label: "Supervision – Hauptüberschrift", widget: string, required: false }
          - { name: supervision_subtitle,   label: "Supervision – Untertitel", widget: string, required: false }
          - { name: supervision_blocks, label: "Supervision – Inhalt", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }

          # ─── Preise ───
          - { name: preise_page_title, label: "Preise – Seitentitel", widget: string, required: false }
          - { name: preise_h1,         label: "Preise – Hauptüberschrift", widget: string, required: false }
          - { name: preise_subtitle,   label: "Preise – Untertitel", widget: string, required: false }
          - { name: preise_intro,      label: "Preise – Einleitung", widget: text, required: false }
          - name: preise_cards
            label: "Preise – Preiskarten"
            label_singular: "Preiskarte"
            widget: list
            required: false
            fields:
              - { name: eyebrow,   label: "Beschriftung oben (z.B. 90 Minuten)", widget: string, required: false }
              - { name: currency,  label: "Währung", widget: string, required: false, default: "CHF" }
              - { name: price,     label: "Betrag (nur Zahl)", widget: string, required: false }
              - { name: unit,      label: "Einheit (z.B. / Stunde)", widget: string, required: false }
              - { name: desc,      label: "Beschreibung", widget: text, required: false }
              - { name: link_text, label: "Link-Text", widget: string, required: false }
              - { name: link,      label: "Link-Ziel", widget: string, required: false }
          - { name: preise_disc_h,     label: "Preise – Rabatt Titel", widget: string, required: false }
          - { name: preise_disc_intro, label: "Preise – Rabatt Einleitung", widget: text, required: false }
          - name: preise_discounts
            label: "Preise – Rabatte"
            label_singular: "Rabatt"
            widget: list
            required: false
            fields:
              - { name: amount, label: "Wert (z.B. 10 %)", widget: string, required: false }
              - { name: label,  label: "Beschreibung", widget: string, required: false }
          - { name: preise_pay_h,   label: "Preise – Bezahlung Titel", widget: string, required: false }
          - { name: preise_pay_p,   label: "Preise – Bezahlung Text", widget: text, required: false }
          - { name: preise_uns_h,   label: "Preise – Unsicher Titel", widget: string, required: false }
          - { name: preise_uns_p,   label: "Preise – Unsicher Text", widget: text, required: false }
          - { name: preise_uns_cta, label: "Preise – Button", widget: string, required: false }

          # ─── Über mich ───
          - { name: about_page_title, label: "Über mich – Seitentitel", widget: string, required: false }
          - { name: about_h1,         label: "Über mich – Hauptüberschrift", widget: string, required: false }
          - { name: about_subtitle,   label: "Über mich – Untertitel", widget: string, required: false }
          - { name: about_intro_blocks, label: "Über mich – Einleitung", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }
          - { name: about_quote, label: "Über mich – Zitat (hervorgehoben)", widget: text, required: false }
          - { name: about_personal_blocks, label: "Über mich – Persönlich", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }
          - { name: about_background_blocks, label: "Über mich – Fachlicher Hintergrund", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }
          - { name: about_cta, label: "Über mich – Button", widget: string, required: false }

          # ─── Kontakt ───
          - { name: kontakt_page_title, label: "Kontakt – Seitentitel", widget: string, required: false }
          - { name: kontakt_h1,         label: "Kontakt – Hauptüberschrift", widget: string, required: false }
          - { name: kontakt_subtitle,   label: "Kontakt – Untertitel", widget: string, required: false }
          - { name: kontakt_eb,         label: "Kontakt – Kleiner Text", widget: string, required: false }
          - { name: kontakt_cred,       label: "Kontakt – Berufsbezeichnung", widget: text, required: false, hint: "HTML erlaubt (<br>)" }
          - name: kontakt_methods
            label: "Kontakt – Kontaktmöglichkeiten"
            label_singular: "Kontaktmöglichkeit"
            widget: list
            required: false
            fields:
              - { name: title,      label: "Titel (z.B. Telefon)", widget: string, required: false }
              - { name: note,       label: "Zusatzzeile (optional)", widget: string, required: false }
              - { name: value,      label: "Anzeigetext (z.B. Nummer / Link-Text)", widget: string, required: false }
              - { name: value_href, label: "Link (z.B. tel:..., mailto:..., https://...)", widget: string, required: false }
          - { name: kontakt_note_h,    label: "Kontakt – Hinweis Titel", widget: string, required: false }
          - { name: kontakt_note_p,    label: "Kontakt – Hinweis Text", widget: text, required: false }
          - { name: kontakt_book_eb,   label: "Kontakt – Buchung Kleiner Text", widget: string, required: false }
          - { name: kontakt_book_h,    label: "Kontakt – Buchung Titel", widget: string, required: false }
          - { name: kontakt_book_p,    label: "Kontakt – Buchung Text", widget: text, required: false }
          - { name: kontakt_book_soon, label: "Kontakt – Buchung bald Text", widget: string, required: false }

          # ─── AGB ───
          - { name: agb_page_title, label: "AGB – Seitentitel", widget: string, required: false }
          - { name: agb_h1,         label: "AGB – Hauptüberschrift", widget: string, required: false }
          - { name: agb_blocks, label: "AGB – Inhalt", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }

          # ─── Datenschutz ───
          - { name: datenschutz_page_title, label: "Datenschutz – Seitentitel", widget: string, required: false }
          - { name: datenschutz_h1,         label: "Datenschutz – Hauptüberschrift", widget: string, required: false }
          - { name: datenschutz_blocks, label: "Datenschutz – Inhalt", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }

          # ─── Nutzung & Impressum ───
          - { name: nutzung_page_title, label: "Nutzung – Seitentitel", widget: string, required: false }
          - { name: nutzung_h1,         label: "Nutzung – Hauptüberschrift", widget: string, required: false }
          - { name: nutzung_blocks, label: "Nutzung – Inhalt", label_singular: "Element", widget: list, required: false, types: *blocktypes_de }
          - { name: nutzung_resp_label, label: "Nutzung – Verantwortlich (Label)", widget: string, required: false }
          - { name: nutzung_resp_name,  label: "Nutzung – Verantwortlich (Name/Adresse)", widget: string, required: false }

      # ════════════════════════════════════════════════════════════════
      #  ENGLISH
      # ════════════════════════════════════════════════════════════════
      - name: "english"
        label: "🇬🇧 English – Edit texts"
        file: "content-en.json"
        fields:
          # ─── Home: Hero ───
          - { name: hero_eyebrow, label: "Home · Hero – Small text top", widget: string, required: false }
          - { name: hero_h1,      label: "Home · Hero – Main headline", widget: string, required: false, hint: "HTML allowed, e.g. <em>Text</em>" }
          - { name: hero_p,       label: "Home · Hero – Subtitle", widget: text, required: false }
          - { name: hero_btn1,    label: "Home · Hero – Button Appointment", widget: string, required: false }
          - { name: hero_btn2,    label: "Home · Hero – Button About", widget: string, required: false }

          # ─── Home: Welcome ───
          - { name: welcome_eyebrow, label: "Home · Welcome – Small text", widget: string, required: false }
          - { name: welcome_h2,      label: "Home · Welcome – Heading", widget: string, required: false }
          - name: welcome_blocks
            label: "Home · Welcome – Paragraphs"
            label_singular: "Paragraph"
            widget: list
            required: false
            types: &blocktypes_en
              - { name: heading,    label: "Heading",      widget: object, fields: [ { name: text, label: "Text", widget: string, required: false } ] }
              - { name: subheading, label: "Subheading",   widget: object, fields: [ { name: text, label: "Text", widget: string, required: false } ] }
              - { name: text,       label: "Paragraph",    widget: object, fields: [ { name: text, label: "Text", widget: text,   required: false, hint: "Simple HTML allowed, e.g. <em> or <strong>" } ] }
              - { name: quote,      label: "Quote",        widget: object, fields: [ { name: text, label: "Text", widget: text,   required: false } ] }
              - { name: bullets,    label: "Bullet list",  widget: object, fields: [ { name: items, label: "Items", widget: list, required: false } ] }
              - { name: button,     label: "Button",       widget: object, fields: [ { name: text, label: "Label", widget: string, required: false }, { name: link, label: "Link (e.g. kontakt.html)", widget: string, required: false } ] }
              - { name: image,      label: "Image",        widget: object, fields: [ { name: image, label: "Image", widget: image, required: false }, { name: alt, label: "Image description", widget: string, required: false } ] }
              - { name: spacer,     label: "Spacer",       widget: object, fields: [ { name: size, label: "Height (e.g. 2rem)", widget: string, required: false, default: "2rem" } ] }

          # ─── Home: Services ───
          - { name: services_eyebrow, label: "Home · Services – Small text", widget: string, required: false }
          - { name: services_h2,      label: "Home · Services – Heading", widget: string, required: false }
          - { name: services_p,       label: "Home · Services – Intro", widget: text, required: false }
          - name: services_cards
            label: "Home · Services – Cards"
            label_singular: "Card"
            widget: list
            required: false
            fields:
              - { name: title,     label: "Title", widget: string, required: false }
              - { name: desc,      label: "Description", widget: text, required: false }
              - { name: link_text, label: "Link text (e.g. Learn more →)", widget: string, required: false }
              - { name: link,      label: "Link target (e.g. beratung.html)", widget: string, required: false }

          # ─── Home: Quote ───
          - { name: phil_quote, label: "Home · Quote", widget: text, required: false }
          - { name: phil_cite,  label: "Home · Quote – Author", widget: string, required: false }

          # ─── Home: About teaser ───
          - { name: aboutT_eyebrow, label: "Home · About – Small text", widget: string, required: false }
          - { name: aboutT_h2,      label: "Home · About – Name", widget: string, required: false }
          - { name: aboutT_p1,      label: "Home · About – Paragraph 1", widget: text, required: false }
          - { name: aboutT_p2,      label: "Home · About – Paragraph 2", widget: text, required: false }
          - { name: aboutT_btn,     label: "Home · About – Button", widget: string, required: false }

          # ─── Home: Gallery ───
          - name: gallery
            label: "Home · Gallery (images)"
            label_singular: "Image"
            widget: list
            required: false
            fields:
              - { name: image,   label: "Image", widget: image, required: false }
              - { name: caption, label: "Caption", widget: string, required: false }

          # ─── Home: Testimonials ───
          - { name: testi_eb, label: "Home · Testimonials – Small text", widget: string, required: false }
          - { name: testi_h2, label: "Home · Testimonials – Heading", widget: string, required: false }
          - name: testimonials
            label: "Home · Testimonials"
            label_singular: "Testimonial"
            widget: list
            required: false
            fields:
              - { name: quote, label: "Text", widget: text, required: false }
              - { name: cite,  label: "Name / source", widget: string, required: false }

          # ─── Home: CTA & Footer ───
          - { name: cta_h2,   label: "Home · CTA – Heading", widget: string, required: false }
          - { name: cta_p,    label: "Home · CTA – Text", widget: text, required: false }
          - { name: cta_btn1, label: "Home · CTA – Button 1", widget: string, required: false }
          - { name: cta_btn2, label: "Home · CTA – Button 2", widget: string, required: false }
          - { name: footer_brand,     label: "Footer – Description", widget: text, required: false }
          - { name: footer_copyright, label: "Footer – Copyright", widget: string, required: false }
          - { name: footer_note,      label: "Footer – Note", widget: string, required: false }

          # ─── Counselling ───
          - { name: beratung_page_title, label: "Counselling – Page title", widget: string, required: false }
          - { name: beratung_h1,         label: "Counselling – Main heading", widget: string, required: false }
          - { name: beratung_subtitle,   label: "Counselling – Subtitle", widget: string, required: false }
          - { name: beratung_blocks, label: "Counselling – Content", label_singular: "Element", widget: list, required: false, types: *blocktypes_en }

          # ─── Supervision ───
          - { name: supervision_page_title, label: "Supervision – Page title", widget: string, required: false }
          - { name: supervision_h1,         label: "Supervision – Main heading", widget: string, required: false }
          - { name: supervision_subtitle,   label: "Supervision – Subtitle", widget: string, required: false }
          - { name: supervision_blocks, label: "Supervision – Content", label_singular: "Element", widget: list, required: false, types: *blocktypes_en }

          # ─── Pricing ───
          - { name: preise_page_title, label: "Pricing – Page title", widget: string, required: false }
          - { name: preise_h1,         label: "Pricing – Main heading", widget: string, required: false }
          - { name: preise_subtitle,   label: "Pricing – Subtitle", widget: string, required: false }
          - { name: preise_intro,      label: "Pricing – Intro", widget: text, required: false }
          - name: preise_cards
            label: "Pricing – Price cards"
            label_singular: "Price card"
            widget: list
            required: false
            fields:
              - { name: eyebrow,   label: "Top label (e.g. 90 minutes)", widget: string, required: false }
              - { name: currency,  label: "Currency", widget: string, required: false, default: "CHF" }
              - { name: price,     label: "Amount (number only)", widget: string, required: false }
              - { name: unit,      label: "Unit (e.g. / hour)", widget: string, required: false }
              - { name: desc,      label: "Description", widget: text, required: false }
              - { name: link_text, label: "Link text", widget: string, required: false }
              - { name: link,      label: "Link target", widget: string, required: false }
          - { name: preise_disc_h,     label: "Pricing – Discount heading", widget: string, required: false }
          - { name: preise_disc_intro, label: "Pricing – Discount intro", widget: text, required: false }
          - name: preise_discounts
            label: "Pricing – Discounts"
            label_singular: "Discount"
            widget: list
            required: false
            fields:
              - { name: amount, label: "Value (e.g. 10 %)", widget: string, required: false }
              - { name: label,  label: "Description", widget: string, required: false }
          - { name: preise_pay_h,   label: "Pricing – Payment heading", widget: string, required: false }
          - { name: preise_pay_p,   label: "Pricing – Payment text", widget: text, required: false }
          - { name: preise_uns_h,   label: "Pricing – Unsure heading", widget: string, required: false }
          - { name: preise_uns_p,   label: "Pricing – Unsure text", widget: text, required: false }
          - { name: preise_uns_cta, label: "Pricing – Button", widget: string, required: false }

          # ─── About ───
          - { name: about_page_title, label: "About – Page title", widget: string, required: false }
          - { name: about_h1,         label: "About – Main heading", widget: string, required: false }
          - { name: about_subtitle,   label: "About – Subtitle", widget: string, required: false }
          - { name: about_intro_blocks, label: "About – Intro", label_singular: "Element", widget: list, required: false, types: *blocktypes_en }
          - { name: about_quote, label: "About – Highlighted quote", widget: text, required: false }
          - { name: about_personal_blocks, label: "About – Personal", label_singular: "Element", widget: list, required: false, types: *blocktypes_en }
          - { name: about_background_blocks, label: "About – Professional background", label_singular: "Element", widget: list, required: false, types: *blocktypes_en }
          - { name: about_cta, label: "About – Button", widget: string, required: false }

          # ─── Contact ───
          - { name: kontakt_page_title, label: "Contact – Page title", widget: string, required: false }
          - { name: kontakt_h1,         label: "Contact – Main heading", widget: string, required: false }
          - { name: kontakt_subtitle,   label: "Contact – Subtitle", widget: string, required: false }
          - { name: kontakt_eb,         label: "Contact – Small text", widget: string, required: false }
          - { name: kontakt_cred,       label: "Contact – Job title", widget: text, required: false, hint: "HTML allowed (<br>)" }
          - name: kontakt_methods
            label: "Contact – Contact options"
            label_singular: "Contact option"
            widget: list
            required: false
            fields:
              - { name: title,      label: "Title (e.g. Phone)", widget: string, required: false }
              - { name: note,       label: "Extra line (optional)", widget: string, required: false }
              - { name: value,      label: "Display text (number / link text)", widget: string, required: false }
